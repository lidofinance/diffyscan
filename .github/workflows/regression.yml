name: Regression Tests

on: [workflow_dispatch, push]

# .github/workflows/ci.yaml
permissions: # least-privilege principle
  contents: read # widen only if you need more

jobs:
  regression:
    runs-on: ubuntu-latest
    env:
      DEVCONTAINER_BUILD_CACHE_DIR: .buildx-cache
      DEVCONTAINER_IMAGE: diffyscan-regression:${{ github.sha }}
      ETHERSCAN_EXPLORER_TOKEN: ${{ secrets.ETHERSCAN_EXPLORER_TOKEN }}
      GITHUB_API_TOKEN: ${{ github.token }}
      REMOTE_RPC_URL: ${{ matrix.network == 'mainnet' && secrets['REMOTE_RPC_URL_MAINNET'] || secrets['REMOTE_RPC_URL_HOODI'] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: config_samples/ethereum/mainnet/safe_harbor/safe_harbor.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/vaults/vaults_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/vaults/vaults_voting_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/vaults/vaults_easy_track_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/vaults-wrapper/vaults_wrapper_factory_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/gualGovernance/dual_governance_mainnet_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/gualGovernance/dual_governance_mainnet_voting_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/gualGovernance/dual_governance_mainnet_upgrade_voting_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/tw/tw_config.json
            network: mainnet
          - config: config_samples/ethereum/mainnet/circuit-breaker/circuit_breaker_config.yaml
            network: mainnet
          - config: config_samples/ethereum/mainnet/tw/tw_easy_track_config.json
            network: mainnet
          - config: config_samples/ethereum/hoodi/vaults/hoodi_vaults_testnet_config.json
            network: hoodi
          - config: config_samples/ethereum/hoodi/vaults/hoodi_vaults_easy_track_config.json
            network: hoodi
          - config: config_samples/ethereum/hoodi/srv3/hoodi_srv3_config.json
            network: hoodi
          - config: config_samples/ethereum/hoodi/srv3/hoodi_srv3_easy_track_config.json
            network: hoodi
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Restore diffyscan caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .diffyscan_cache
          key: diffyscan-cache-${{ github.ref_name }}-${{ matrix.config }}-${{ github.sha }}
          restore-keys: |
            diffyscan-cache-${{ github.ref_name }}-${{ matrix.config }}-

      - name: Restore devcontainer build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.DEVCONTAINER_BUILD_CACHE_DIR }}
          key: devcontainer-buildx-${{ runner.os }}-${{ hashFiles('.devcontainer/Dockerfile', '.dockerignore') }}
          restore-keys: |
            devcontainer-buildx-${{ runner.os }}-

      - name: Build devcontainer image
        run: |
          docker buildx create --use --name diffyscan-builder
          docker buildx inspect --bootstrap
          docker buildx build \
            --cache-from "type=local,src=${DEVCONTAINER_BUILD_CACHE_DIR}" \
            --cache-to "type=local,dest=${DEVCONTAINER_BUILD_CACHE_DIR}-new,mode=max" \
            --file .devcontainer/Dockerfile \
            --load \
            --tag "${DEVCONTAINER_IMAGE}" \
            .
          rm -rf "${DEVCONTAINER_BUILD_CACHE_DIR}"
          mv "${DEVCONTAINER_BUILD_CACHE_DIR}-new" "${DEVCONTAINER_BUILD_CACHE_DIR}"

      - name: Run regression in devcontainer
        env:
          DIFFYSCAN_CONFIG: ${{ matrix.config }}
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${GITHUB_WORKSPACE}:/workspaces/diffyscan" \
            --workdir /workspaces/diffyscan \
            --env DIFFYSCAN_CONFIG \
            --env ETHERSCAN_EXPLORER_TOKEN \
            --env GITHUB_API_TOKEN \
            --env REMOTE_RPC_URL \
            --env HOME=/tmp/diffyscan-home \
            --env UV_LINK_MODE=copy \
            --env XDG_CACHE_HOME=/tmp/diffyscan-home/.cache \
            "${DEVCONTAINER_IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p "$HOME" "$XDG_CACHE_HOME"
              uv sync --locked --group dev
              uv run pytest -q
              uv run mypy
              uv run pre-commit run --all-files
              uv run diffyscan -Y -E -G "$DIFFYSCAN_CONFIG"
            '
