    # DepositSecurityModule — deploy tx 0x658bfa3893140ceebf2fa6ba139a3fcfb5355a08e4894a2ca8039185f22bb5ea
    "0xf738F86009Ec704880c9Aa175fc5869F020FEe4e":
      - reason: >-
          DepositSecurityModule computes three bytes32 message prefixes
          (ATTEST/PAUSE/UNVET) from block.chainid and address(this) in the
          constructor. diffyscan simulates deployment at a different address, so all
          three differ. Each is inlined at two offsets (UNVET 643/2023, PAUSE
          824/1388, ATTEST 882/4976); the pinned values are the on-chain immutables.
          The same allowance exists for the mainnet srv3 DSM. Runtime logic is
          unchanged.
