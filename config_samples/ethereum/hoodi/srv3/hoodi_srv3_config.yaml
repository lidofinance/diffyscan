# Note: no bytecode_comparison.libraries here — after diffyscan PR #183 the
# explorer-declared libraries are re-keyed to their defining files and linked
# automatically, so a config-level map is unnecessary (the mainnet srv3 config was
# simplified the same way in e663cfe). A config-level map would also be injected into
# every contract's solc input and pollute its CBOR metadata.
#
# Hoodi srv3 was deployed in waves (see deployed-hoodi.json
# history in lidofinance/core) from commits older than the pin eae86148. Where a file
# of a contract's compilation unit was touched afterwards (comments/formatting only),
# the source hashes embedded in the CBOR metadata trailer differ — those contracts
# carry a cbor_metadata allowance naming the exact changed file. Executable runtime
# bytecode is verified identical instruction-by-instruction in all cases.
allowed_diffs:
  bytecode:
    # Accounting — deploy tx 0xe6bbd9315277bd48387df7aec099f66e8bd74ee9f804bbd894494c782e195e39
    "0xA39fe063A6d1420E59d218d318d52D84Fbd9202F":
      - reason: >-
          Deployed on 2026-06-12 (core 0b105b2e, first appearance of the address in
          deployed-hoodi.json) while the config pins eae86148. Between those commits
          contracts/common/interfaces/IOracleReportSanityChecker.sol changed — the unused checkCLPendingBalanceIncrease declaration was removed from the interface (no runtime effect). The CBOR metadata trailer embeds keccak hashes of
          the compilation sources, so the recompiled trailer cannot match the
          deployed one under this pin.
          Executable runtime bytecode is identical.
        cbor_metadata: true

    # AccountingOracle — deploy tx 0xef5b00ef71351cc46172c3d918057cd7597b9963427cd0ca39c100fa58e570b1
