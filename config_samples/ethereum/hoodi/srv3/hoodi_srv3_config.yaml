    "0x05C392877165372Bf76dd08d52D4445bFEd6FF1F":
      - reason: >-
          StakingRouter links SRLib and BeaconChainDepositor. solc records the linked
          libraries in the contract's CBOR metadata, and diffyscan's recompile records
          them differently from the original deployment (which linked placeholders
          after compilation), so the metadata hash differs. The same allowance exists
          for the mainnet srv3 StakingRouter. Runtime bytecode is identical.
        cbor_metadata: true

    # SRLib — deploy tx 0x642b43285eb62d5baba81cb83f62ba006a48be52a6cbd2430fb8493bf8fbab6e
    "0x7c178B9B797C6ea6776A784C22A0f95a79385c9b":
      - reason: >-
          Call protection bakes SRLib's own address in (a deployed library only runs
          via delegatecall), so that immutable differs on the simulated redeploy.
          Linking MinFirstAllocationStrategy also shifts the CBOR metadata vs the
          original deploy. The same allowance exists for the mainnet srv3 SRLib.
          Runtime logic is identical.
        immutables:
