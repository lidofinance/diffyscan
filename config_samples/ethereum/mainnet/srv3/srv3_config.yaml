fail_on_bytecode_comparison_error: true

bytecode_comparison:
  extra_sources:
    "0x17be979344f2c2cC806229a532D92f8742C10462":
      - contracts/common/interfaces/IPausableUntil.sol

  deployment_from:
    # DepositSecurityModule uses msg.sender in the constructor so to match the on-chain 
    # deployed bytecode we must simulate deployment from the same address.
    "0xF573E9E3de1f86B085417ab294f56E7920B4e9Be": "0x22c79cd20d8da8e6910e965086968075867447c0"

allowed_diffs:
  bytecode:
    "0xF573E9E3de1f86B085417ab294f56E7920B4e9Be":
    - reason: >-
        DepositSecurityModule computes three bytes32 message prefixes
        (ATTEST/PAUSE/UNVET) from address(this) in the constructor. diffyscan
        simulates deployment at a different address, so all three differ. Each is
        inlined at two offsets (UNVET 643/2023, PAUSE 824/1388, ATTEST 882/4976).
        The pinned values match the live on-chain getters (checked via eth_call).
        Runtime logic is unchanged.
      immutables:
      - offset: 643
        value: "0x90b2d3a4cbdc8a60c14ccf87f2bd90a9881cef5bd52d5bf4b3ec48497f97d06e"
      - offset: 824
        value: "0xe3fb87228adf6fbdd12dc1496751f0251453f29ac84ebbd3a699461b51f1de7b"
      - offset: 882
        value: "0x683df20ff74dc438e214ff44087d5e4b6ccf03b21e7f1ba074459a5212abd912"
      - offset: 1388
        value: "0xe3fb87228adf6fbdd12dc1496751f0251453f29ac84ebbd3a699461b51f1de7b"
      - offset: 2023
        value: "0x90b2d3a4cbdc8a60c14ccf87f2bd90a9881cef5bd52d5bf4b3ec48497f97d06e"
      - offset: 4976
        value: "0x683df20ff74dc438e214ff44087d5e4b6ccf03b21e7f1ba074459a5212abd912"

    "0xc0be9942Fd8f54aB126A5F0Ba649A90049ccad14":
    - reason: >-
        Call protection bakes SRLib's own address in (it runs only via delegatecall),
        so that immutable differs on the simulated redeploy. Linking
        MinFirstAllocationStrategy also shifts the CBOR metadata vs the original
        deploy. Runtime logic is identical.
      immutables:
      - offset: 7
        value: "0x000000000000000000000000c0be9942fd8f54ab126a5f0ba649a90049ccad14"
      cbor_metadata: true

    "0xf98AC162eAB766bDB9507c3584c00C535B8F6216":
    - reason: >-
        A deployed library has its own address baked in as call protection (it only
        runs via delegatecall). The simulated redeploy lands at a different address,
        so that one immutable differs. Runtime logic is identical.
      immutables:
      - offset: 7
        value: "0x000000000000000000000000f98ac162eab766bdb9507c3584c00c535b8f6216"

    "0xDD76927045435C7605cf6f5F978cfb8CABDb5F80":
    - reason: >-
        StakingRouter links SRLib and BeaconChainDepositor. solc records the linked
        libraries in the contract's CBOR metadata, and diffyscan's recompile records
        them differently from the original deployment, so the metadata hash differs.
        Runtime bytecode is identical.
      cbor_metadata: true

  source:
    # TODO: ask Etherscan to fix the indentation upstream, then drop this allowance
    "0x6Fb4c152F092373dD71f0C07C83c1E77406599aB":
    - reason: >-
        Etherscan verification artifact: the per-contract verified source of
        ConsolidationMigrator carries a 1-space indentation on the closing brace of
        struct StakingModule in SRTypes.sol that is absent at the GitHub commit.
        Formatting only (Etherscan verifies per-contract from a build-info snapshot);
        no declaration/logic change, runtime bytecode matches modulo CBOR metadata.
      line_ranges:
      - file: contracts/0.8.25/sr/SRTypes.sol
        github:
          start: 115
          count: 1
        explorer:
          start: 115
          count: 1
