allowed_diffs:
  bytecode:
    "0xF573E9E3de1f86B085417ab294f56E7920B4e9Be":
    - reason: >-
        Three bytes32 message-prefix immutables (ATTEST/PAUSE/UNVET_MESSAGE_PREFIX)
        are computed in the constructor as keccak256(domain_const, block.chainid,
        address(this)). diffyscan simulates deployment at a synthetic address, so
        address(this) and all three prefixes differ. The compiler inlines each at two
        read sites, giving six offsets: UNVET=643/2023, PAUSE=824/1388, ATTEST=882/4976.
        The pinned values match the live on-chain getters (checked via eth_call).
        STAKING_ROUTER and DEPOSIT_CONTRACT come from exact constructor_calldata and
        match on-chain, so they are absent here. Runtime logic is unchanged.
      immutables:
      - offset: 643
        value: "0x90b2d3a4cbdc8a60c14ccf87f2bd90a9881cef5bd52d5bf4b3ec48497f97d06e"
      - offset: 824
        value: "0xe3fb87228adf6fbdd12dc1496751f0251453f29ac84ebbd3a699461b51f1de7b"
      - offset: 882
        value: "0x683df20ff74dc438e214ff44087d5e4b6ccf03b21e7f1ba074459a5212abd912"
      - offset: 1388
        value: "0xe3fb87228adf6fbdd12dc1496751f0251453f29ac84ebbd3a699461b51f1de7b"
      - offset: 2023
        value: "0x90b2d3a4cbdc8a60c14ccf87f2bd90a9881cef5bd52d5bf4b3ec48497f97d06e"
      - offset: 4976
        value: "0x683df20ff74dc438e214ff44087d5e4b6ccf03b21e7f1ba074459a5212abd912"

    "0xc0be9942Fd8f54aB126A5F0Ba649A90049ccad14":
    - reason: >-
        Library call-protection immutable holds the library's own deployed address
        (baked in at deploy) and cannot match a simulated redeployment. Its linked
        MinFirstAllocationStrategy is listed under two path keys (explorer use-site
        plus the manual definition), which shifts the CBOR metadata hash. Runtime
        logic is identical.
      immutables:
      - offset: 7
        value: "0x000000000000000000000000c0be9942fd8f54ab126a5f0ba649a90049ccad14"
      cbor_metadata: true

    "0xf98AC162eAB766bDB9507c3584c00C535B8F6216":
    - reason: >-
        Library call-protection immutable holds the library's own deployed address
        (baked in at deploy) and cannot match a simulated redeployment. Runtime logic
        is identical.
      immutables:
      - offset: 7
        value: "0x000000000000000000000000f98ac162eab766bdb9507c3584c00c535b8f6216"

    "0xDD76927045435C7605cf6f5F978cfb8CABDb5F80":
    - reason: >-
        SRLib and BeaconChainDepositor are listed under two path keys (explorer
        use-site plus the manual definition), which shifts the CBOR metadata hash.
        Runtime bytecode is identical.
      cbor_metadata: true

